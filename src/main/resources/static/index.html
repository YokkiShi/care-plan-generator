<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Care Plan Generator</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; color: #333; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    h2 { font-size: 0.95rem; color: #666; font-weight: normal; margin: 20px 0 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    label { display: block; margin-top: 12px; font-size: 0.85rem; color: #555; }
    input, textarea {
      width: 100%; padding: 8px 10px; margin-top: 4px;
      border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; box-sizing: border-box;
    }
    textarea { height: 80px; resize: vertical; }
    button {
      margin-top: 20px; padding: 10px 24px; background: #2563eb;
      color: white; border: none; border-radius: 4px; font-size: 0.95rem; cursor: pointer;
    }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    #status-bar {
      margin-top: 20px; padding: 10px 14px; border-radius: 4px;
      font-size: 0.9rem; display: none;
    }
    #status-bar.pending    { background: #fefce8; border: 1px solid #fde047; color: #854d0e; }
    #status-bar.processing { background: #eff6ff; border: 1px solid #93c5fd; color: #1e40af; }
    #status-bar.failed     { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; }
    #result {
      margin-top: 24px; background: #f8f8f8; border: 1px solid #ddd;
      border-radius: 4px; padding: 16px; white-space: pre-wrap;
      font-size: 0.9rem; line-height: 1.6; display: none;
    }
  </style>
</head>
<body>
  <h1>Care Plan Generator</h1>

  <form id="form">
    <h2>Patient</h2>
    <label>First Name</label>
    <input name="firstName" placeholder="e.g. Jane" required />

    <label>Last Name</label>
    <input name="lastName" placeholder="e.g. Smith" required />

    <label>MRN (6 digits)</label>
    <input name="mrn" placeholder="e.g. 000123" pattern="[0-9]{6}" required />

    <label>Date of Birth</label>
    <input name="dob" type="date" required />

    <h2>Provider</h2>
    <label>Provider Name</label>
    <input name="providerName" placeholder="e.g. Dr. Wang" required />

    <label>NPI (10 digits)</label>
    <input name="npi" placeholder="e.g. 1234567890" pattern="[0-9]{10}" required />

    <h2>Order</h2>
    <label>Medication</label>
    <input name="medicationName" placeholder="e.g. IVIG" required />

    <label>Primary Diagnosis (ICD-10)</label>
    <input name="primaryDiagnosis" placeholder="e.g. G70.01" required />

    <label>Medication History (optional)</label>
    <textarea name="medicationHistory" placeholder="e.g. Pyridostigmine, Prednisone"></textarea>

    <button type="submit" id="btn">Generate Care Plan</button>
  </form>

  <div id="status-bar"></div>
  <pre id="result"></pre>

  <script>
    let pollInterval = null;

    function stopPolling() {
      if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }
    }

    function setStatus(type, message) {
      const bar = document.getElementById('status-bar');
      bar.className = type;
      bar.textContent = message;
      bar.style.display = 'block';
    }

    async function pollStatus(carePlanId) {
      try {
        const res = await fetch(`/api/careplan/${carePlanId}/status`);
        const json = await res.json();

        if (json.status === 'COMPLETED') {
          stopPolling();
          setStatus('', `Care Plan ID: ${carePlanId} | Status: COMPLETED`);
          document.getElementById('result').textContent = json.content;
          document.getElementById('result').style.display = 'block';
          document.getElementById('btn').disabled = false;

        } else if (json.status === 'FAILED') {
          stopPolling();
          setStatus('failed', 'Failed to generate care plan. Please try again.');
          document.getElementById('btn').disabled = false;

        } else if (json.status === 'PROCESSING') {
          setStatus('processing', `Care Plan ID: ${carePlanId} | Status: PROCESSING...`);

        } else {
          setStatus('pending', `Care Plan ID: ${carePlanId} | Status: PENDING — waiting for worker...`);
        }
      } catch (err) {
        setStatus('failed', 'Network error while checking status.');
        stopPolling();
        document.getElementById('btn').disabled = false;
      }
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      stopPolling();

      const btn = document.getElementById('btn');
      const result = document.getElementById('result');

      btn.disabled = true;
      result.style.display = 'none';
      setStatus('pending', 'Submitting order...');

      const data = Object.fromEntries(new FormData(e.target));

      try {
        const res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const json = await res.json();

        if (!res.ok || json.error) {
          setStatus('failed', json.error || 'Failed to submit order.');
          btn.disabled = false;
          return;
        }

        const carePlanId = json.carePlanId;
        setStatus('pending', `Care Plan ID: ${carePlanId} | Status: PENDING — waiting for worker...`);

        // 每 3 秒轮询一次
        pollInterval = setInterval(() => pollStatus(carePlanId), 3000);

      } catch (err) {
        setStatus('failed', 'Network error. Please try again.');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
